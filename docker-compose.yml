services:
  postgres:
    image: postgres:16
    container_name: anima-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: anima
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d anima"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
